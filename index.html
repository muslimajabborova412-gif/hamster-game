<!DOCTYPE html>
<html lang="tg">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pro Hamster Clicker</title>
    <style>
        body { 
            background: #0f0f13; color: #fff; font-family: sans-serif;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            height: 100vh; margin: 0; overflow: hidden;
        }
        .balance { font-size: 3rem; font-weight: 800; color: #ffd700; margin-bottom: 20px; }
        .tap-area { 
            width: 280px; height: 280px; background: radial-gradient(#3a3a45, #1a1a20);
            border-radius: 50%; border: 8px solid #333; display: flex; align-items: center;
            justify-content: center; cursor: pointer; transition: 0.2s; box-shadow: 0 0 30px rgba(255, 215, 0, 0.2);
        }
        .tap-area:active { transform: scale(0.95); border-color: #ffd700; }
        .tap-area img { width: 180px; }
        .floating-text { 
            position: absolute; font-size: 2rem; font-weight: bold; color: #fff;
            pointer-events: none; animation: floatUp 1s ease-out;
        }
        @keyframes floatUp {
            0% { opacity: 1; transform: translateY(0); }
            100% { opacity: 0; transform: translateY(-100px); }
        }
    </style>
</head>
<body>

    <div class="balance" id="score">0</div>
    <div class="tap-area" id="coin">
        <img src="https://cdn-icons-png.flaticon.com/512/3069/3069172.png" alt="Hamster">
    </div>

    <script>
        let score = 0;
        const scoreEl = document.getElementById('score');
        const coin = document.getElementById('coin');

        coin.addEventListener('click', (e) => {
            score++;
            scoreEl.innerText = score;

            // Эффекти рақами ҷаҳида
            let span = document.createElement('span');
            span.innerText = "+1";
            span.className = "floating-text";
            span.style.left = (e.clientX - 20) + 'px';
            span.style.top = (e.clientY - 50) + 'px';
            document.body.appendChild(span);
            setTimeout(() => span.remove(), 1000);
        });
    </script>
</body>
</html>
