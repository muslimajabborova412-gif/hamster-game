<!DOCTYPE html>
<html lang="tg">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Coin Clicker</title>
    <style>
        body { background: #121212; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; margin: 0; color: white; }
        .score { font-size: 40px; margin-bottom: 20px; color: gold; }
        
        /* Тангаи асосӣ */
        .main-coin { width: 150px; cursor: pointer; transition: 0.1s; }
        .main-coin:active { transform: scale(0.9); }

        /* Қуттии танга (копилка) */
        .box { width: 100px; height: 100px; background: #333; margin-top: 50px; border-radius: 10px; display: flex; align-items: center; justify-content: center; border: 2px solid gold; }
        
        /* Аниматсияи тангаи парвозкунанда */
        .flying-coin { position: absolute; width: 40px; transition: 0.5s ease-in; }
    </style>
</head>
<body>

    <div class="score" id="score">0</div>
    <img src="https://cdn-icons-png.flaticon.com/512/527/527491.png" class="main-coin" id="coin" alt="Coin">
    <div class="box" id="box">💰</div>

    <script>
        let score = 0;
        const coin = document.getElementById('coin');
        const box = document.getElementById('box');
        const scoreDisplay = document.getElementById('score');

        coin.addEventListener('click', (e) => {
            score++;
            scoreDisplay.innerText = score;

            // Сохтани тангаи парвозкунанда
            let flyingCoin = document.createElement('img');
            flyingCoin.src = "https://cdn-icons-png.flaticon.com/512/527/527491.png";
            flyingCoin.className = "flying-coin";
            flyingCoin.style.left = e.clientX + 'px';
            flyingCoin.style.top = e.clientY + 'px';
            document.body.appendChild(flyingCoin);

            // Ҳаракат ба сӯи қуттӣ
            setTimeout(() => {
                let boxRect = box.getBoundingClientRect();
                flyingCoin.style.left = boxRect.left + 'px';
                flyingCoin.style.top = boxRect.top + 'px';
                flyingCoin.style.opacity = '0';
            }, 10);

            // Нест кардани танга
            setTimeout(() => { flyingCoin.remove(); }, 500);
        });
    </script>
</body>
</html>
